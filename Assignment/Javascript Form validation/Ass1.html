<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Builder</title>
</head>
<body>
    <form id="faqForm">
        <input type="text" id="question" placeholder="Enter Question"><br><br>
        <textarea id="answer" placeholder="Enter Anwer"></textarea><br><br>
        <button type="submit">Add FAQ</button>
        <p id="message"></p>
    </form>
    <hr>
    <div id="faqContainer">
        <p id="emptyMsg">No FAQs available</p>
    </div>
    <script src="./Ass1.js"></script>
</body>
</html>
